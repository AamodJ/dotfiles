source = $HOME/.config/hypr/macchiato.conf

$accent = $mauve 
$accentAlpha = $mauveAlpha
$font = JetBrainsMono Nerd Font

general {
	disable_loading_bar = true
	hide_cursor = true
}

background {
	monitor = 
	path = $HOME/.local/share/bg.jpg
	blur_passes = 2
	color = $base
}

# Time
label {
	monitor = 
	text = $TIME
	color = $text
	font_size = 90
	font_family = $font
	position = 0, 300
	haligh = center
	valigh = center
}

# Date
label {
	monitor = 
	text = cmd[update:43200000] date +"%A, %d %B %Y"
	color = $text
	font_size = 25
	font_family = $font
	position = 0, 200
	haligh = center
	valigh = center
}

input-field {
	monitor = 
	size = 300, 60
	outline_thickness = 4
	dots_size = 0.2
	dots_spacing = 0.2
	dots_center = true
	outer_color = $accent 
	inner_color = $surface0
	font_color = $text 
	fade_on_empty = false
	placeholder_text = Input password...
	hide_input = false
	check_color = $accent 
	fail_color = $red 
	fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
	capslock_color = $yellow
	position = 0, -47
	haligh = center
	valigh = center
}

# More option see https://github.com/DreamMaoMao/mango/wiki/


source-optional=~/.config/mango/.env
source=~/.config/mango/conf/autostart.conf
source=~/.config/mango/conf/monitors.conf
source=~/.config/mango/conf/input.conf
source=~/.config/mango/conf/appearance.conf
source=~/.config/mango/conf/binds.conf
source=~/.config/mango/conf/window-tag-rules.conf
source=~/.config/mango/conf/misc.conf

switchbind=fold,spawn,lockscreen

animations=0

# reload config
bind=CTRL+SHIFT,r,reload_config

# layer rule
# layerrule=animation_type_open:zoom,layer_name:rofi
# layerrule=animation_type_close:zoom,layer_name:rofi
